<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      try {
        const theme = localStorage.getItem("neil-birthday-theme");
        if (theme === "dark") document.documentElement.dataset.theme = "dark";
        const lang = localStorage.getItem("neil-birthday-lang");
        if (lang === "hi" || lang === "pa" || lang === "bn") {
          document.documentElement.lang = lang;
        }
      } catch {}
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
